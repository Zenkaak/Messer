name: Build & Release Admin APK

on:
  push:
    branches: [main]
    paths:
      - 'android-admin-app/**'
      - '.github/workflows/build-admin-apk.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Make gradlew executable
        run: chmod +x android-admin-app/gradlew

      - name: Build release APK
        working-directory: android-admin-app
        run: ./gradlew assembleRelease --no-daemon

      - name: Rename APK
        run: |
          APK=$(find android-admin-app/app/build/outputs/apk/release -name "*.apk" | head -1)
          SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          cp "$APK" "GSMAdmin-${SHA}.apk"
          echo "APK_PATH=GSMAdmin-${SHA}.apk" >> $GITHUB_ENV
          echo "APK_NAME=GSMAdmin-${SHA}.apk" >> $GITHUB_ENV
          echo "RELEASE_TAG=admin-apk-${SHA}" >> $GITHUB_ENV

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ env.RELEASE_TAG }}" \
            --title "Admin APK (${{ env.RELEASE_TAG }})" \
            --notes "Admin app build for commit ${{ github.sha }}" \
            --latest=false \
            "${{ env.APK_PATH }}"
