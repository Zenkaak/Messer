name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: gradle

      - name: Accept SDK licenses and install components
        run: |
          yes | "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager" --licenses 2>/dev/null || true
          "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager" "platforms;android-34" "build-tools;34.0.0" 2>/dev/null || true

      - name: Make gradlew executable
        working-directory: android
        run: chmod +x gradlew

      - name: Bump versionCode
        working-directory: android
        run: sed -i "s/versionCode [0-9]*/versionCode ${{ github.run_number }}/" app/build.gradle

      - name: Build release APK
        working-directory: android
        run: ./gradlew assembleRelease --no-daemon

      - name: Restore signing keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > "$RUNNER_TEMP/release.p12"

      - name: Sign APK
        working-directory: android
        run: |
          BTDIR="$ANDROID_SDK_ROOT/build-tools/34.0.0"
          UNSIGNED=$(find app/build/outputs/apk/release/ -name "*.apk" | head -1)
          ALIGNED="$RUNNER_TEMP/aligned.apk"
          SIGNED="$RUNNER_TEMP/GSMWorld.apk"
          "$BTDIR/zipalign" -v -p 4 "$UNSIGNED" "$ALIGNED"
          "$BTDIR/apksigner" sign \
            --ks "$RUNNER_TEMP/release.p12" \
            --ks-type PKCS12 \
            --ks-pass pass:gsmworld2024 \
            --key-pass pass:gsmworld2024 \
            --ks-key-alias key \
            --out "$SIGNED" \
            "$ALIGNED"
          echo "SIGNED_APK=$SIGNED" >> "$GITHUB_ENV"

      - name: Publish release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete latest --yes --cleanup-tag 2>/dev/null || true
          sleep 2
          gh release create latest "${{ env.SIGNED_APK }}#GSMWorld.apk" --title "GSM World Build ${{ github.run_number }}" --notes "Build ${{ github.run_number }} from commit ${{ github.sha }}" --latest
