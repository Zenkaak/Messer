name: Build & Release User APK (GSMWorld.apk)

on:
  push:
    branches: [main]
    paths:
      - 'android-user-app/**'
      - '.github/workflows/build-user-apk.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Make gradlew executable
        run: chmod +x android-user-app/gradlew

      - name: Build debug APK
        working-directory: android-user-app
        env:
          APP_VERSION: "1.0.${{ github.run_number }}"
        run: ./gradlew assembleDebug --no-daemon

      - name: Rename APK to GSMWorld.apk
        run: |
          APK=$(find android-user-app/app/build/outputs/apk/debug -name "*.apk" | head -1)
          cp "$APK" GSMWorld.apk
          echo "APK_PATH=GSMWorld.apk" >> $GITHUB_ENV

      - name: Delete existing latest user release (if any)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete latest-user-apk --yes 2>/dev/null || true
          git push --delete origin latest-user-apk 2>/dev/null || true

      - name: Create GitHub Release with GSMWorld.apk
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create latest-user-apk \
            --title "GSM World App (latest)" \
            --notes "Latest build of the GSM World Android app. Download GSMWorld.apk to install." \
            --latest=false \
            GSMWorld.apk
