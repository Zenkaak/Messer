kind = "web"
previewPath = "/"
title = "GSM World Store"
version = "1.0.0"
id = "artifacts/gsm-africa"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23217

[services.development]
run = "pnpm --filter @workspace/gsm-africa run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/gsm-africa", "run", "build" ]
publicDir = "artifacts/gsm-africa/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23217"
BASE_PATH = "/"
