    <!-- =====================================================
         SPLASH SCREEN — shown until React mounts.
         Prevents the white-flash on first load.
         ===================================================== -->
    <style>
      :root { color-scheme: dark; }
      html, body { margin: 0; padding: 0; background: #0a1628; }

      #splash {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: linear-gradient(145deg, #0a1628 0%, #0f2240 100%);
        transition: opacity 0.35s ease, visibility 0.35s ease;
      }
      #splash.hidden { opacity: 0; visibility: hidden; pointer-events: none; }

      /* Icon */
      #splash-icon {
        width: 88px;
        height: 88px;
        border-radius: 22px;
        background: linear-gradient(145deg, #0d2040, #1a3a60);
        box-shadow: 0 0 40px rgba(0,200,220,0.25), 0 0 0 1px rgba(0,200,220,0.15);
        display: flex;
        align-items: center;
        justify-content: center;
        margin-bottom: 22px;
        animation: pulse-icon 2s ease-in-out infinite;
      }
      @keyframes pulse-icon {
        0%, 100% { box-shadow: 0 0 28px rgba(0,200,220,0.22), 0 0 0 1px rgba(0,200,220,0.14); }
        50%       { box-shadow: 0 0 52px rgba(0,200,220,0.42), 0 0 0 1px rgba(0,200,220,0.28); }
      }

      /* App name */
      #splash-title {
        font-family: 'Arial Black', Arial, sans-serif;
        font-size: 22px;
        font-weight: 900;
        letter-spacing: 4px;
        color: #e8f4ff;
        margin-bottom: 6px;
      }
      #splash-sub {
        font-family: Arial, sans-serif;
        font-size: 11px;
        letter-spacing: 2px;
        color: #00c8e0;
        text-transform: uppercase;
        margin-bottom: 40px;
        opacity: 0.8;
      }

      /* Spinner */
      #splash-spinner {
        width: 32px;
        height: 32px;
        border: 3px solid rgba(0,200,220,0.15);
        border-top-color: #00c8e0;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <!-- Splash shown immediately; React removes it once mounted -->
    <div id="splash">
      <div id="splash-icon">
        <!-- Inline mini version of the GSM World globe icon -->
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 88 88" width="88" height="88">
          <defs>
            <linearGradient id="t" x1="0" y1="0" x2="1" y2="1">
              <stop offset="0%" stop-color="#00e0f4"/>
              <stop offset="100%" stop-color="#0099cc"/>
            </linearGradient>
            <clipPath id="cc"><circle cx="44" cy="44" r="26"/></clipPath>
          </defs>
          <circle cx="44" cy="44" r="26" fill="#00c8e0" opacity="0.07"/>
          <circle cx="44" cy="44" r="26" fill="none" stroke="url(#t)" stroke-width="2.5"/>
          <g clip-path="url(#cc)" opacity="0.7">
            <line x1="18" y1="44" x2="70" y2="44" stroke="#00d8f0" stroke-width="1.5"/>
            <path d="M 31 30 Q 44 27 57 30" stroke="#00d8f0" stroke-width="1.3" fill="none"/>
            <path d="M 31 58 Q 44 61 57 58" stroke="#00d8f0" stroke-width="1.3" fill="none"/>
            <line x1="44" y1="18" x2="44" y2="70" stroke="#00d8f0" stroke-width="1.5"/>
            <path d="M 37 18 Q 30 44 37 70" stroke="#00d8f0" stroke-width="1.2" fill="none"/>
            <path d="M 51 18 Q 58 44 51 70" stroke="#00d8f0" stroke-width="1.2" fill="none"/>
          </g>
          <!-- Mini padlock -->
          <rect x="54" y="57" width="15" height="12" rx="3" fill="#00cce4"/>
          <path d="M 57 57 L 57 51 Q 57 46 61.5 46 Q 66 46 66 51 L 66 54" stroke="#00cce4" stroke-width="2.5" fill="none" stroke-linecap="round"/>
          <rect x="55.5" y="58.5" width="12" height="9" rx="2" fill="#0a1628"/>
          <circle cx="61.5" cy="62" r="2" fill="#00cce4"/>
        </svg>
      </div>
      <div id="splash-title">GSM WORLD</div>
      <div id="splash-sub">Global Unlock Services</div>
      <div id="splash-spinner"></div>
    </div>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>

    <!-- Remove splash once React has painted something into #root -->
    <script>
      (function () {
        var splash = document.getElementById('splash');
        if (!splash) return;
        var observer = new MutationObserver(function () {
          var root = document.getElementById('root');
          if (root && root.firstChild) {
            splash.classList.add('hidden');
            setTimeout(function () { splash.remove(); }, 400);
            observer.disconnect();
          }
        });
        observer.observe(document.getElementById('root'), { childList: true, subtree: true });
        // Safety net: always remove after 4 s even if observer fires late
        setTimeout(function () { splash.classList.add('hidden'); setTimeout(function () { splash.remove(); }, 400); }, 4000);
      })();
    </script>
  </body>
</html>
