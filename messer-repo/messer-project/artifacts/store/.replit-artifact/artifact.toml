kind = "web"
previewPath = "/gsm-store-legacy"
title = "GSM World Store"
version = "1.0.0"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/gsm-store-legacy" ]
localPort = 3000

[services.development]
run = "pnpm -C /home/runner/workspace/messer --filter @workspace/gsm-africa run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/gsm-africa", "run", "build" ]
publicDir = "messer/artifacts/gsm-africa/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "3000"
BASE_PATH = "/gsm-store-legacy"
