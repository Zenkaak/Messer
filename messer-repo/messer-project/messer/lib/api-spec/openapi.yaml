openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: categories
    description: Product categories
  - name: products
    description: Products
  - name: cart
    description: Shopping cart
  - name: orders
    description: Orders
  - name: checkout
    description: Checkout and payments
  - name: users
    description: Users
  - name: admin
    description: Admin operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /categories:
    get:
      operationId: listCategories
      tags: [categories]
      summary: List all categories
      responses:
        "200":
          description: List of categories
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Category"
    post:
      operationId: createCategory
      tags: [categories]
      summary: Create a category
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCategory"
      responses:
        "201":
          description: Created category
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Category"

  /categories/{id}:
    get:
      operationId: getCategory
      tags: [categories]
      summary: Get a category by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Category
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Category"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    put:
      operationId: updateCategory
      tags: [categories]
      summary: Update a category
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCategory"
      responses:
        "200":
          description: Updated category
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Category"
    delete:
      operationId: deleteCategory
      tags: [categories]
      summary: Delete a category
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /products:
    get:
      operationId: listProducts
      tags: [products]
      summary: List products with search, filters, sorting and pagination
      parameters:
        - name: search
          in: query
          schema:
            type: string
        - name: category
          in: query
          description: Category slug
          schema:
            type: string
        - name: category_id
          in: query
          schema:
            type: integer
        - name: featured
          in: query
          schema:
            type: boolean
        - name: in_stock
          in: query
          schema:
            type: boolean
        - name: sort
          in: query
          schema:
            type: string
            enum: [newest, price_asc, price_desc, popular]
        - name: min_price
          in: query
          description: Minimum price filter (inclusive)
          schema:
            type: number
        - name: max_price
          in: query
          description: Maximum price filter (inclusive)
          schema:
            type: number
        - name: page
          in: query
          schema:
            type: integer
        - name: limit
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Paginated list of products
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductListResponse"
    post:
      operationId: createProduct
      tags: [products]
      summary: Create a product
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProduct"
      responses:
        "201":
          description: Created product
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"

  /products/{id}:
    get:
      operationId: getProduct
      tags: [products]
      summary: Get a product by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Product
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    put:
      operationId: updateProduct
      tags: [products]
      summary: Update a product
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProduct"
      responses:
        "200":
          description: Updated product
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
    delete:
      operationId: deleteProduct
      tags: [products]
      summary: Delete a product
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /cart:
    get:
      operationId: getCart
      tags: [cart]
      summary: Get cart for current session
      responses:
        "200":
          description: Cart response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CartResponse"
    post:
      operationId: addToCart
      tags: [cart]
      summary: Add item to cart
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddToCartBody"
      responses:
        "200":
          description: Updated cart
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CartResponse"

  /cart/{productId}:
    put:
      operationId: updateCartItem
      tags: [cart]
      summary: Update cart item quantity by product ID
      parameters:
        - name: productId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateCartItemBody"
      responses:
        "200":
          description: Updated cart
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CartResponse"
    delete:
      operationId: removeFromCart
      tags: [cart]
      summary: Remove item from cart by product ID
      parameters:
        - name: productId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Updated cart
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CartResponse"

  /checkout:
    post:
      operationId: createCheckout
      tags: [checkout]
      summary: Create a checkout and initiate payment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCheckoutBody"
      responses:
        "200":
          description: Checkout result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateCheckoutResponse"

  /payments/mpesa/query:
    post:
      operationId: queryMpesaPayment
      tags: [checkout]
      summary: Query M-Pesa STK payment status
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/QueryMpesaPaymentBody"
      responses:
        "200":
          description: Payment status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QueryMpesaPaymentResponse"

  /orders:
    get:
      operationId: listOrders
      tags: [orders]
      summary: List orders
      parameters:
        - name: session_id
          in: query
          schema:
            type: string
        - name: payment_status
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of orders
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Order"
    post:
      operationId: createOrder
      tags: [orders]
      summary: Create an order
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateOrder"
      responses:
        "201":
          description: Created order
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"

  /orders/{id}:
    get:
      operationId: getOrder
      tags: [orders]
      summary: Get an order by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Order with items
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderWithItems"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updateOrderStatus
      tags: [orders]
      summary: Update order payment status
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateOrderStatus"
      responses:
        "200":
          description: Updated order
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"

  /users:
    get:
      operationId: listUsers
      tags: [users]
      summary: List all users
      responses:
        "200":
          description: List of users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/User"
    post:
      operationId: createUser
      tags: [users]
      summary: Create a user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateUser"
      responses:
        "201":
          description: Created user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /users/{id}:
    get:
      operationId: getUser
      tags: [users]
      summary: Get a user by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: User
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updateUser
      tags: [users]
      summary: Update a user
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateUser"
      responses:
        "200":
          description: Updated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /admin/settings:
    get:
      operationId: listAdminSettings
      tags: [admin]
      summary: List all raw admin settings
      responses:
        "200":
          description: Admin settings
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AdminSetting"
    post:
      operationId: upsertAdminSetting
      tags: [admin]
      summary: Create or update an admin setting
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpsertAdminSetting"
      responses:
        "200":
          description: Upserted setting
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminSetting"

  /admin/settings/all:
    get:
      operationId: getAdminSettings
      tags: [admin]
      summary: Get all admin settings as a structured object
      responses:
        "200":
          description: Structured admin settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminSettingsAll"

  /admin/settings/update:
    post:
      operationId: updateAdminSettings
      tags: [admin]
      summary: Update multiple admin settings at once
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        "200":
          description: Updated settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminSettingsAll"

  /admin/tool-activations:
    get:
      operationId: listToolActivations
      tags: [admin]
      summary: List tool activations
      parameters:
        - name: status
          in: query
          schema:
            type: string
        - name: user_id
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Tool activations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ToolActivation"
    post:
      operationId: createToolActivation
      tags: [admin]
      summary: Create a tool activation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateToolActivation"
      responses:
        "201":
          description: Created tool activation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ToolActivation"

  /admin/tool-activations/{id}:
    patch:
      operationId: updateToolActivation
      tags: [admin]
      summary: Update a tool activation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateToolActivation"
      responses:
        "200":
          description: Updated tool activation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ToolActivation"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required: [error]

    Category:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        slug:
          type: string
        productCount:
          type: integer
      required: [id, name, slug, productCount]

    CreateCategory:
      type: object
      properties:
        name:
          type: string
        slug:
          type: string
      required: [name, slug]

    Product:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: string
        price:
          type: number
        originalPrice:
          type: number
          nullable: true
        imageUrl:
          type: string
          nullable: true
        inStock:
          type: boolean
        featured:
          type: boolean
        categoryId:
          type: integer
        categoryName:
          type: string
          nullable: true
        createdAt:
          type: string
      required: [id, name, description, price, inStock, featured, categoryId, createdAt]

    ProductListResponse:
      type: object
      properties:
        products:
          type: array
          items:
            $ref: "#/components/schemas/Product"
        total:
          type: integer
        totalPages:
          type: integer
      required: [products, total, totalPages]

    CreateProduct:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        price:
          type: number
        originalPrice:
          type: number
          nullable: true
        imageUrl:
          type: string
          nullable: true
        categoryId:
          type: integer
        inStock:
          type: boolean
        featured:
          type: boolean
      required: [name, price, categoryId]

    CartItem:
      type: object
      properties:
        productId:
          type: integer
        productName:
          type: string
        price:
          type: number
        quantity:
          type: integer
        imageUrl:
          type: string
          nullable: true
      required: [productId, productName, price, quantity]

    CartResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/CartItem"
        total:
          type: number
        itemCount:
          type: integer
      required: [items, total, itemCount]

    AddToCartBody:
      type: object
      properties:
        productId:
          type: integer
        quantity:
          type: integer
      required: [productId, quantity]

    UpdateCartItemBody:
      type: object
      properties:
        quantity:
          type: integer
      required: [quantity]

    CreateCheckoutBody:
      type: object
      properties:
        customerEmail:
          type: string
        customerPhone:
          type: string
          nullable: true
        customerName:
          type: string
          nullable: true
        paymentMethod:
          type: string
        sessionId:
          type: string
          nullable: true
      required: [customerEmail, paymentMethod]

    CheckoutMpesaData:
      type: object
      properties:
        checkoutRequestId:
          type: string
        message:
          type: string
      required: [checkoutRequestId, message]

    CheckoutUsdtData:
      type: object
      properties:
        walletAddress:
          type: string
          nullable: true
        network:
          type: string
        amountUsdt:
          type: number
        memo:
          type: string
      required: [network, amountUsdt, memo]

    CreateCheckoutResponse:
      type: object
      properties:
        orderId:
          type: integer
        paymentMethod:
          type: string
        status:
          type: string
        total:
          type: number
        currency:
          type: string
        mpesa:
          allOf:
            - $ref: "#/components/schemas/CheckoutMpesaData"
          nullable: true
        usdt:
          allOf:
            - $ref: "#/components/schemas/CheckoutUsdtData"
          nullable: true
        custom:
          nullable: true
      required: [orderId, paymentMethod, status, total, currency]

    QueryMpesaPaymentBody:
      type: object
      properties:
        orderId:
          type: integer
        checkoutRequestId:
          type: string
          nullable: true
      required: [orderId]

    QueryMpesaPaymentResponse:
      type: object
      properties:
        paymentStatus:
          type: string
          enum: [pending, paid, failed]
        message:
          type: string
      required: [paymentStatus, message]

    Order:
      type: object
      properties:
        id:
          type: integer
        sessionId:
          type: string
        customerEmail:
          type: string
        customerPhone:
          type: string
          nullable: true
        customerName:
          type: string
          nullable: true
        paymentMethod:
          type: string
        paymentStatus:
          type: string
        total:
          type: string
        currency:
          type: string
        notes:
          type: string
          nullable: true
        createdAt:
          type: string
        paidAt:
          type: string
          nullable: true
      required: [id, sessionId, customerEmail, paymentMethod, paymentStatus, total, currency, createdAt]

    OrderItem:
      type: object
      properties:
        id:
          type: integer
        orderId:
          type: integer
        productId:
          type: integer
        productName:
          type: string
        price:
          type: string
        quantity:
          type: integer
      required: [id, orderId, productId, productName, price, quantity]

    OrderWithItems:
      allOf:
        - $ref: "#/components/schemas/Order"
        - type: object
          properties:
            items:
              type: array
              items:
                $ref: "#/components/schemas/OrderItem"
          required: [items]

    CreateOrder:
      type: object
      properties:
        sessionId:
          type: string
        customerEmail:
          type: string
        customerPhone:
          type: string
          nullable: true
        customerName:
          type: string
          nullable: true
        paymentMethod:
          type: string
        total:
          type: string
        currency:
          type: string
        notes:
          type: string
          nullable: true
        items:
          type: array
          items:
            type: object
            properties:
              productId:
                type: integer
              productName:
                type: string
              price:
                type: string
              quantity:
                type: integer
            required: [productId, productName, price, quantity]
      required: [sessionId, customerEmail, paymentMethod, total, items]

    UpdateOrderStatus:
      type: object
      properties:
        paymentStatus:
          type: string
        paidAt:
          type: string
          nullable: true
      required: [paymentStatus]

    User:
      type: object
      properties:
        id:
          type: integer
        email:
          type: string
        name:
          type: string
          nullable: true
        createdAt:
          type: string
        walletBalance:
          type: string
        status:
          type: string
      required: [id, email, createdAt, walletBalance, status]

    CreateUser:
      type: object
      properties:
        email:
          type: string
        passwordHash:
          type: string
        name:
          type: string
          nullable: true
      required: [email, passwordHash]

    UpdateUser:
      type: object
      properties:
        name:
          type: string
          nullable: true
        status:
          type: string
        walletBalance:
          type: string

    AdminSetting:
      type: object
      properties:
        id:
          type: integer
        key:
          type: string
        value:
          type: string
          nullable: true
        updatedAt:
          type: string
      required: [id, key, updatedAt]

    UpsertAdminSetting:
      type: object
      properties:
        key:
          type: string
        value:
          type: string
          nullable: true
      required: [key]

    PaymentMethodEntry:
      type: object
      properties:
        method:
          type: string
        walletAddress:
          type: string
        network:
          type: string
          nullable: true
        label:
          type: string
          nullable: true
        enabled:
          type: boolean
      required: [method, walletAddress]

    AdminSettingsAll:
      type: object
      properties:
        mpesaEnabled:
          type: boolean
        mpesaShortcode:
          type: string
          nullable: true
        mpesaConsumerKey:
          type: string
          nullable: true
        mpesaConsumerSecret:
          type: string
          nullable: true
        mpesaPasskey:
          type: string
          nullable: true
        mpesaCallbackUrl:
          type: string
          nullable: true
        whatsappContact:
          type: string
          nullable: true
        mpesaEnv:
          type: string
        usdtEnabled:
          type: boolean
        usdtWalletAddress:
          type: string
          nullable: true
        usdtNetwork:
          type: string
        nowpaymentsEnabled:
          type: boolean
        nowpaymentsApiKey:
          type: string
          nullable: true
        coingateEnabled:
          type: boolean
        coingateApiKey:
          type: string
          nullable: true
        emailFrom:
          type: string
          nullable: true
        smtpHost:
          type: string
          nullable: true
        smtpPort:
          type: string
          nullable: true
        smtpSecure:
          type: boolean
        smtpUser:
          type: string
          nullable: true
        smtpPass:
          type: string
          nullable: true
        paymentMethods:
          type: array
          items:
            $ref: "#/components/schemas/PaymentMethodEntry"
      required:
        - mpesaEnabled
        - mpesaEnv
        - usdtEnabled
        - usdtNetwork
        - nowpaymentsEnabled
        - coingateEnabled
        - smtpSecure
        - paymentMethods

    ToolActivation:
      type: object
      properties:
        id:
          type: integer
        userId:
          type: integer
        toolName:
          type: string
        toolCategory:
          type: string
        username:
          type: string
        serialKey:
          type: string
        orderRef:
          type: string
          nullable: true
        status:
          type: string
        activationCode:
          type: string
          nullable: true
        notes:
          type: string
          nullable: true
        createdAt:
          type: string
        updatedAt:
          type: string
      required: [id, userId, toolName, toolCategory, username, serialKey, status, createdAt, updatedAt]

    CreateToolActivation:
      type: object
      properties:
        userId:
          type: integer
        toolName:
          type: string
        toolCategory:
          type: string
        username:
          type: string
        serialKey:
